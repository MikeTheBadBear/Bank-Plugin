plugins {
    id 'java'
}

group = 'com.bank.bank'
version = '1.1'

repositories {
    mavenCentral()
    maven { url = 'https://hub.spigotmc.org/nexus/content/repositories/snapshots/' }
    maven { url = 'https://repo.papermc.io/repository/maven-public/' }
    maven { url = 'https://repo.purpurmc.org/snapshots/' }
    maven { url = 'https://repo.newanarchy.net/repository/maven-releases/' }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:1.21.4-R0.1-SNAPSHOT'
    compileOnly 'net.milkbowl:vaultunlocked:1.7.3'
    compileOnly 'net.citizensnpcs:citizensapi:2.0.35-SNAPSHOT'
    implementation 'com.cryptomorin:XSeries:11.2.0.1'
}